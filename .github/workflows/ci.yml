# Continuous Integration
# Runs on every push and pull request
# Builds all projects and runs tests to ensure code quality

name: CI

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'samples/**'
      - 'assets/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/dependabot.yml'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'samples/**'
      - 'assets/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/dependabot.yml'
  workflow_dispatch:

# Cancel previous runs on the same branch / PR when a new commit comes in
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # `cache: true` enables NuGet package caching keyed on packages.lock.json
      # / Directory.Packages.props. Saves ~30–60s per job after the first run.
      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/Directory.Packages.props'

      - name: Restore
        run: dotnet restore

      # `dotnet build-server shutdown` releases stale MSBuild/Roslyn worker
      # processes from a previous job — required to avoid intermittent file
      # locking errors on the hosted runners.
      - name: Build
        # Build the source generator first to avoid a Windows-hosted-runner
        # race where multiple consumer projects build it in parallel and
        # CS2012 the generator DLL while it's being written.
        run: |
          dotnet build-server shutdown
          dotnet build src/Sdk.Generators/Sdk.Generators.csproj --no-restore -c Release
          dotnet build Spectara.Revela.slnx --no-restore -c Release

      - name: Run Tests
        # `--solution` is required for the new MTP-based dotnet test to
        # discover plugin test projects (without it only Core/Commands/
        # Integration are exercised — 168 plugin tests are silently skipped).
        run: dotnet test --solution Spectara.Revela.slnx --no-build -c Release --report-trx --results-directory ./TestResults --coverage --coverage-settings coverage.config --coverage-output-format cobertura

      # AOT regression canary — Cli.Embedded.csproj has <PublishAot>true</PublishAot>
      # unconditional, so this catches any reflection-based pattern that slips
      # in (CBSG, [OptionsValidator], typed Expression trees, etc.). Trim/AOT
      # analyzer warnings escalate to errors via TreatWarningsAsErrors=true.
      # Runs on all three OS runners: every runner has its native toolchain
      # pre-installed (gcc on ubuntu, MSVC on windows, Xcode CLT on macos).
      # No --no-restore: publish needs to restore RID-specific runtime assets.
      - name: Publish Cli.Embedded — AOT (smoke test)
        run: |
          dotnet publish src/Cli.Embedded/Cli.Embedded.csproj \
            -c Release \
            --self-contained \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -p:StripSymbols=true \
            -o ./publish-embedded
        shell: bash

      - name: Smoke test — run AOT binary
        run: |
          cd publish-embedded
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            ./revela.exe --version
          else
            chmod +x ./revela
            ./revela --version
          fi
        shell: bash

      # Integration smoke: render the showcase sample end-to-end with the
      # AOT binary. This is the canary that catches AOT regressions which
      # --version cannot — every layer is exercised:
      #   • CBSG-bound config (showcase project.json → IOptions<T>)
      #   • Scriban template render via [RevelaTemplateModel] projections
      #   • Filter expression trees (showcase uses exif.iso >= 3200,
      #     year(dateTaken) == 2024, etc. — covers Nullable<T>/DateTime paths)
      #   • NetVips P/Invoke under AOT (libvips image processing)
      #   • Manifest JSON roundtrip (incremental cache)
      #   • Statistics plugin aggregation
      # ~10–20 s on hosted runners (1.3 s warm locally on the AOT binary).
      - name: Integration smoke — generate samples/showcase
        run: |
          cd samples/showcase
          rm -rf output cache
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            ../../publish-embedded/revela.exe generate all
          else
            ../../publish-embedded/revela generate all
          fi
          # Sanity assertions: templates rendered + images processed.
          test -f output/index.html
          test -d output/galleries
          # Count generated image variants (must be > 0). Use a counted file
          # check rather than `find | grep -q .` which gets SIGPIPE-burned
          # under GitHub Actions' `set -eo pipefail` default and produces a
          # spurious failure even when the pipeline output is correct.
          imgcount=$(find output -type f \( -name '*.webp' -o -name '*.jpg' \) | wc -l)
          if [ "$imgcount" -eq 0 ]; then
            echo "❌ No image variants produced — image pipeline likely broken under AOT"
            exit 1
          fi
          echo "✓ $imgcount image variants produced (expected: ~228)"
        shell: bash

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: |
            ./TestResults/**/*.trx
            ./artifacts/bin/**/TestResults/**/*.cobertura.xml
