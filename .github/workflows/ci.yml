# Continuous Integration
# Runs on every push and pull request
# Builds all projects and runs tests to ensure code quality

name: CI

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'samples/**'
      - 'assets/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/dependabot.yml'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'samples/**'
      - 'assets/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/dependabot.yml'
  workflow_dispatch:

# Cancel previous runs on the same branch / PR when a new commit comes in
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # `cache: true` enables NuGet package caching keyed on packages.lock.json
      # / Directory.Packages.props. Saves ~30–60s per job after the first run.
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/Directory.Packages.props'

      - name: Restore
        run: dotnet restore

      # `dotnet build-server shutdown` releases stale MSBuild/Roslyn worker
      # processes from a previous job — required to avoid intermittent file
      # locking errors on the hosted runners.
      - name: Build
        run: |
          dotnet build-server shutdown
          dotnet build --no-restore -c Release

      - name: Run Tests
        run: dotnet test --no-build -c Release --report-trx --results-directory ./TestResults --coverage --coverage-settings coverage.config --coverage-output-format cobertura

      # Smoke-test: ensure Cli.Embedded publishes as self-contained single file
      # This catches issues with statically linked plugins/themes early.
      # No --no-restore: publish needs to restore RID-specific assets (the
      # earlier `dotnet restore` step ran without a RID).
      - name: Publish Cli.Embedded (smoke test)
        run: |
          dotnet publish src/Cli.Embedded/Cli.Embedded.csproj \
            -c Release \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=embedded \
            -o ./publish-embedded
        shell: bash

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: |
            ./TestResults/**/*.trx
            ./artifacts/bin/**/TestResults/**/*.cobertura.xml
