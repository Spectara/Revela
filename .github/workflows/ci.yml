# Continuous Integration
# Runs on every push and pull request
# Builds all projects and runs tests to ensure code quality

name: CI

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'samples/**'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'samples/**'
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: |
          dotnet build-server shutdown
          dotnet build --no-restore -c Release

      - name: Run Tests
        run: dotnet test --no-build -c Release --report-trx --results-directory ./TestResults --coverage --coverage-settings coverage.config --coverage-output-format cobertura

      # Smoke-test: ensure Cli.Embedded publishes as self-contained single file
      # This catches issues with statically linked plugins/themes early
      - name: Publish Cli.Embedded (smoke test)
        run: |
          dotnet publish src/Cli.Embedded/Cli.Embedded.csproj \
            -c Release \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -o ./publish-embedded \
            --no-restore
        shell: bash

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: |
            ./TestResults/**/*.trx
            ./artifacts/bin/**/TestResults/**/*.cobertura.xml

      - name: Test Summary
        if: always()
        run: |
          echo "### Test Results (${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Test results uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
