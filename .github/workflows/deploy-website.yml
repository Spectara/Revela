name: Deploy Website

on:
  # Automatically deploy after a successful release
  workflow_run:
    workflows: ["Release"]
    types: [completed]

  # Also deploy on website content changes (uses latest existing release)
  push:
    branches: [main]
    paths:
      - 'samples/revela-website/**'

  # Manual trigger
  workflow_dispatch:

# Only one website deployment at a time
concurrency:
  group: website-deploy
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  deploy:
    name: Generate & Deploy
    runs-on: ubuntu-latest
    # Skip if triggered by a failed release workflow
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download latest Revela release (Standalone)
        uses: robinraju/release-downloader@v1
        id: download-release
        with:
          repository: Spectara/Revela
          latest: true
          preRelease: true
          fileName: "revela-linux-x64-standalone.tar.gz"
          out-file-path: ./revela-download

      - name: Extract Revela
        run: |
          tar -xzf ./revela-download/revela-linux-x64-standalone.tar.gz
          chmod +x ./revela

      - name: Replace download placeholders with actual release URLs
        run: |
          VERSION="${{ steps.download-release.outputs.tag_name }}"
          BASE_URL="https://github.com/Spectara/Revela/releases/download/${VERSION}"

          # Files containing download placeholders
          FILES=(
            "samples/revela-website/source/_index.revela"
            "samples/revela-website/source/03 pages/03 downloads/_index.revela"
          )

          # Standalone (recommended — homepage + downloads page)
          for f in "${FILES[@]}"; do
            sed -i "s|__DOWNLOAD_URL_WIN_X64_STANDALONE__|${BASE_URL}/revela-win-x64-standalone.zip|g" "$f"
            sed -i "s|__DOWNLOAD_URL_OSX_ARM64_STANDALONE__|${BASE_URL}/revela-osx-arm64-standalone.tar.gz|g" "$f"
            sed -i "s|__DOWNLOAD_URL_LINUX_X64_STANDALONE__|${BASE_URL}/revela-linux-x64-standalone.tar.gz|g" "$f"
          done

          # Full (modular — downloads page only)
          sed -i "s|__DOWNLOAD_URL_WIN_X64_FULL__|${BASE_URL}/revela-win-x64-full.zip|g" "samples/revela-website/source/03 pages/03 downloads/_index.revela"
          sed -i "s|__DOWNLOAD_URL_OSX_ARM64_FULL__|${BASE_URL}/revela-osx-arm64-full.tar.gz|g" "samples/revela-website/source/03 pages/03 downloads/_index.revela"
          sed -i "s|__DOWNLOAD_URL_LINUX_X64_FULL__|${BASE_URL}/revela-linux-x64-full.tar.gz|g" "samples/revela-website/source/03 pages/03 downloads/_index.revela"

          echo "✅ Updated download links to version ${VERSION}"
          echo "   Standalone Windows: ${BASE_URL}/revela-win-x64-standalone.zip"
          echo "   Standalone macOS:   ${BASE_URL}/revela-osx-arm64-standalone.tar.gz"
          echo "   Standalone Linux:   ${BASE_URL}/revela-linux-x64-standalone.tar.gz"
          echo "   Full Windows:       ${BASE_URL}/revela-win-x64-full.zip"
          echo "   Full macOS:         ${BASE_URL}/revela-osx-arm64-full.tar.gz"
          echo "   Full Linux:         ${BASE_URL}/revela-linux-x64-full.tar.gz"

      - name: Generate website
        run: |
          cd samples/revela-website
          ../../revela generate all

      - name: Deploy to Revela.Website
        # Direct git push instead of peaceiris/actions-gh-pages@v4: that
        # action is unmaintained (last release April 2024, still on Node.js
        # 20 — deprecated by GitHub Actions starting June 2026). The action
        # was only thin sugar over `git push`; doing it inline is two extra
        # lines and removes the deprecation warning + a third-party
        # dependency on a credentialed action.
        env:
          DEPLOY_TOKEN: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          PUBLISH_DIR=./samples/revela-website/output
          TARGET_REPO=Spectara/Revela.Website
          TARGET_BRANCH=main

          cd "$PUBLISH_DIR"
          git init -q -b "$TARGET_BRANCH"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -q -m "Deploy from ${{ github.repository }}@${{ github.sha }}"
          git push -qf "https://x-access-token:${DEPLOY_TOKEN}@github.com/${TARGET_REPO}.git" "HEAD:$TARGET_BRANCH"
