name: Deploy Website

# Deployment policy: the live website always reflects the latest released
# binary. Content iteration happens locally via
# `cd samples/revela-website && dotnet run --project ../../src/Cli -- generate all`,
# so there is no push-based auto-deploy. This keeps revela.website 1:1
# consistent with what users can actually download.
#
# Triggers:
#   - workflow_run: deploys after a successful Release workflow
#   - workflow_dispatch: manual deploy for content-only fixes (typos,
#     links, sponsor updates) without cutting a new release
#
# Mechanism: GitHub-native Pages deployment via actions/deploy-pages.
# Pages source for this repo must be set to "GitHub Actions" in the
# repo Settings → Pages, with custom domain `revela.website`. The
# `_static/CNAME` file in the website source ensures the custom domain
# survives every deploy. The `_static/.nojekyll` file disables Jekyll
# post-processing so files starting with `_` are served as-is.
on:
  # Automatically deploy after a successful release
  workflow_run:
    workflows: ["Release"]
    types: [completed]

  # Manual trigger — used for content-only fixes between releases
  workflow_dispatch:

# Only one concurrent Pages deployment. Don't cancel an in-flight deploy
# (Pages backend dislikes that); queue the next one instead.
concurrency:
  group: pages
  cancel-in-progress: false

# Minimum permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: Generate Website
    runs-on: ubuntu-latest
    # Skip if triggered by a failed release workflow
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download latest Revela release (Standalone)
        uses: robinraju/release-downloader@v1
        id: download-release
        with:
          repository: Spectara/Revela
          latest: true
          # Until 1.0 we publish pre-releases. Switch this to `false`
          # once stable releases exist so the live site only follows
          # production-grade builds.
          preRelease: true
          fileName: "revela-linux-x64-standalone.tar.gz"
          out-file-path: ./revela-download

      - name: Extract Revela
        run: |
          tar -xzf ./revela-download/revela-linux-x64-standalone.tar.gz
          chmod +x ./revela

      - name: Replace download placeholders with actual release URLs
        run: |
          VERSION="${{ steps.download-release.outputs.tag_name }}"
          BASE_URL="https://github.com/Spectara/Revela/releases/download/${VERSION}"

          # Files containing download placeholders
          FILES=(
            "samples/revela-website/source/_index.revela"
            "samples/revela-website/source/03 pages/03 downloads/_index.revela"
          )

          # Standalone (recommended — homepage + downloads page)
          for f in "${FILES[@]}"; do
            sed -i "s|__DOWNLOAD_URL_WIN_X64_STANDALONE__|${BASE_URL}/revela-win-x64-standalone.zip|g" "$f"
            sed -i "s|__DOWNLOAD_URL_OSX_ARM64_STANDALONE__|${BASE_URL}/revela-osx-arm64-standalone.tar.gz|g" "$f"
            sed -i "s|__DOWNLOAD_URL_LINUX_X64_STANDALONE__|${BASE_URL}/revela-linux-x64-standalone.tar.gz|g" "$f"
          done

          # Full (modular — downloads page only)
          sed -i "s|__DOWNLOAD_URL_WIN_X64_FULL__|${BASE_URL}/revela-win-x64-full.zip|g" "samples/revela-website/source/03 pages/03 downloads/_index.revela"
          sed -i "s|__DOWNLOAD_URL_OSX_ARM64_FULL__|${BASE_URL}/revela-osx-arm64-full.tar.gz|g" "samples/revela-website/source/03 pages/03 downloads/_index.revela"
          sed -i "s|__DOWNLOAD_URL_LINUX_X64_FULL__|${BASE_URL}/revela-linux-x64-full.tar.gz|g" "samples/revela-website/source/03 pages/03 downloads/_index.revela"

          echo "✅ Updated download links to version ${VERSION}"

      - name: Generate website
        run: |
          cd samples/revela-website
          ../../revela generate all

      - name: Verify Pages markers exist in output
        # Belt-and-braces: if CNAME is ever lost, Pages drops the custom
        # domain. Cheaper to fail the workflow here than to debug DNS.
        run: |
          set -e
          test -f samples/revela-website/output/CNAME || { echo "❌ CNAME missing in output"; exit 1; }
          test -f samples/revela-website/output/.nojekyll || { echo "❌ .nojekyll missing in output"; exit 1; }
          echo "✅ CNAME + .nojekyll present"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: samples/revela-website/output

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
